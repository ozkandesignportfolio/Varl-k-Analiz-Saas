  <rect x="580" y="800" width="280" height="3" rx="1.5" fill="rgba(0,0,0,0.7)"/>
  <line x1="60" y1="800" x2="1380" y2="800" stroke="rgba(255,255,255,0.04)"/>

  <!-- Bottom plate -->
