    <circle cx="378" cy="130" r="3" fill="#fbbf24" opacity=".8"/>
    <text x="390" y="134" fill="rgba(255,255,255,0.7)" font-size="12.5" font-family="-apple-system,system-ui,sans-serif"><tspan fill="rgba(255,255,255,0.85)">Klima</tspan>  <tspan fill="rgba(255,255,255,0.35)">→</tspan>  <tspan>3 gün içinde bakım</tspan></text>
