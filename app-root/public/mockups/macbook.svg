    <rect x="148" y="84" width="24" height="24" rx="6" fill="url(#lg)"/>
    <rect x="154" y="90" width="12" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
    <text x="182" y="101" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="600" font-family="-apple-system,system-ui,sans-serif">Assetly</text>
