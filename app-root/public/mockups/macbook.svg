<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" fill="none">
  <defs>
    <linearGradient id="lid" x1="720" y1="0" x2="720" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a3a3c"/><stop offset="1" stop-color="#1c1c1e"/>
    </linearGradient>
    <linearGradient id="base" x1="720" y1="800" x2="720" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a3a3c"/><stop offset=".5" stop-color="#2c2c2e"/><stop offset="1" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3b82f6" stop-opacity=".4"/><stop offset="1" stop-color="#8b5cf6" stop-opacity=".3"/>
    </linearGradient>
    <clipPath id="screen-clip"><rect x="134" y="30" width="1172" height="754" rx="8"/></clipPath>
  </defs>

  <!-- Lid -->
  <rect x="100" y="0" width="1240" height="800" rx="18" fill="url(#lid)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Webcam -->
  <circle cx="720" cy="16" r="3" fill="#1a1a1e" stroke="rgba(255,255,255,0.06)" stroke-width=".5"/>

