<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" fill="none">
  <defs>
    <linearGradient id="frame" x1="195" y1="0" x2="195" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a3a3c"/><stop offset=".5" stop-color="#2c2c2e"/><stop offset="1" stop-color="#1c1c1e"/>
    </linearGradient>
  </defs>

  <!-- Outer frame -->
  <rect width="390" height="844" rx="56" fill="url(#frame)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Side buttons -->
  <rect x="0" y="180" width="3" height="32" rx="1.5" fill="#2a2a2c"/>
  <rect x="0" y="240" width="3" height="56" rx="1.5" fill="#2a2a2c"/>
  <rect x="0" y="310" width="3" height="56" rx="1.5" fill="#2a2a2c"/>
  <rect x="387" y="260" width="3" height="72" rx="1.5" fill="#2a2a2c"/>

  <!-- Screen -->
  <rect x="8" y="8" width="374" height="828" rx="50" fill="#0a0e1a"/>

  <!-- Dynamic Island -->
  <rect x="138" y="18" width="114" height="32" rx="16" fill="#000" stroke="rgba(0,0,0,0.8)" stroke-width="2"/>
  <circle cx="232" cy="34" r="5" fill="#1a1a2e" stroke="rgba(255,255,255,0.04)" stroke-width=".5"/>

  <!-- Status bar -->
  <text x="48" y="28" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="600" font-family="-apple-system,system-ui,sans-serif">09:41</text>
  <circle cx="326" cy="24" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="338" cy="24" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="350" cy="24" r="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Content area -->
  <!-- Asset icon -->
  <rect x="36" y="80" width="48" height="48" rx="14" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <!-- Snowflake simplified -->
  <line x1="60" y1="92" x2="60" y2="116" stroke="rgba(253,230,138,0.9)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="104" x2="72" y2="104" stroke="rgba(253,230,138,0.9)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="51" y1="95" x2="69" y2="113" stroke="rgba(253,230,138,0.9)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="69" y1="95" x2="51" y2="113" stroke="rgba(253,230,138,0.9)" stroke-width="1.5" stroke-linecap="round"/>

  <text x="96" y="97" fill="rgba(255,255,255,0.4)" font-size="10" letter-spacing="2" font-family="-apple-system,system-ui,sans-serif">VARLIK</text>
  <text x="96" y="120" fill="rgba(255,255,255,0.92)" font-size="22" font-weight="600" font-family="-apple-system,system-ui,sans-serif">Klima</text>

  <!-- Warning banner -->
  <rect x="36" y="148" width="318" height="40" rx="10" fill="rgba(251,191,36,0.1)"/>
  <circle cx="56" cy="168" r="3" fill="#fbbf24" opacity=".8"/>
  <text x="68" y="172" fill="rgba(253,230,138,0.9)" font-size="12.5" font-weight="500" font-family="-apple-system,system-ui,sans-serif">3 gün içinde bakım gerekli</text>

  <!-- Details -->
  <text x="36" y="224" fill="rgba(255,255,255,0.45)" font-size="13" font-family="-apple-system,system-ui,sans-serif">Durum</text>
  <circle cx="310" cy="220" r="3" fill="#fbbf24" opacity=".8"/>
  <text x="354" y="224" fill="rgba(253,230,138,0.9)" font-size="13" text-anchor="end" font-family="-apple-system,system-ui,sans-serif">Dikkat</text>

  <line x1="36" y1="240" x2="354" y2="240" stroke="rgba(255,255,255,0.04)"/>

  <text x="36" y="266" fill="rgba(255,255,255,0.45)" font-size="13" font-family="-apple-system,system-ui,sans-serif">Son bakım</text>
  <text x="354" y="266" fill="rgba(255,255,255,0.85)" font-size="13" text-anchor="end" font-family="-apple-system,system-ui,sans-serif">6 ay önce</text>

  <line x1="36" y1="282" x2="354" y2="282" stroke="rgba(255,255,255,0.04)"/>

  <text x="36" y="308" fill="rgba(255,255,255,0.45)" font-size="13" font-family="-apple-system,system-ui,sans-serif">Not</text>
  <text x="354" y="308" fill="rgba(255,255,255,0.8)" font-size="13" text-anchor="end" font-family="-apple-system,system-ui,sans-serif">Filtre temizliği</text>

  <!-- CTA Button -->
  <rect x="36" y="340" width="318" height="48" rx="14" fill="#3b82f6"/>
  <rect x="36" y="340" width="318" height="24" rx="14" fill="rgba(255,255,255,0.08)"/>
  <text x="195" y="370" text-anchor="middle" fill="#fff" font-size="14" font-weight="600" font-family="-apple-system,system-ui,sans-serif">Bakımı planla</text>

  <!-- Helper text -->
  <text x="195" y="416" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11" font-family="-apple-system,system-ui,sans-serif">Bu işlem zamanında yapılmazsa</text>
  <text x="195" y="432" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11" font-family="-apple-system,system-ui,sans-serif">cihaz verimi düşebilir.</text>

  <!-- Home indicator -->
  <rect x="147" y="816" width="96" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
