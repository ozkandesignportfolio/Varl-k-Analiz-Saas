name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks_scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint_build:
    name: Lint + Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Supabase secrets missing in CI -> skipping build."
            exit 0
          fi
          npm run build

      - name: Verify debug plan route disabled in production
        run: npm run check:debug-plan-prod

      - name: Upload lint/build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-build-failure-artifacts
          path: |
            .next/**
            test-results/**
            playwright-report/**
          if-no-files-found: ignore

  rate_limit_abuse_test:
    name: Rate Limit Abuse Test
    runs-on: ubuntu-latest
    needs: [gitleaks_scan, lint_build]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check Supabase secrets
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "SKIP_SUPABASE_CHAIN=true" >> "$GITHUB_ENV"
            echo "Supabase secrets missing in CI -> skipping Rate Limit Abuse Test steps."
            exit 0
          fi
          echo "SKIP_SUPABASE_CHAIN=false" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: ${{ env.SKIP_SUPABASE_CHAIN != 'true' }}
        run: npm ci

      - name: Run rate-limit abuse spec
        if: ${{ env.SKIP_SUPABASE_CHAIN != 'true' }}
        run: npm run test:abuse:rate-limit

      - name: Upload rate-limit artifacts on failure
        if: ${{ failure() && env.SKIP_SUPABASE_CHAIN != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: rate-limit-failure-artifacts
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
