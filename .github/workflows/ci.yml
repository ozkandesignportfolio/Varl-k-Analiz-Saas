name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-and-scan:
    runs-on: ubuntu-latest

    env:
      TEST_BASE_URL: http://localhost:3100
      API_KEY: ${{ secrets.API_KEY }}
      TRIAL_EMAIL: ${{ secrets.TRIAL_EMAIL }}
      TRIAL_PASSWORD: ${{ secrets.TRIAL_PASSWORD }}
      PREMIUM_EMAIL: ${{ secrets.PREMIUM_EMAIL }}
      PREMIUM_PASSWORD: ${{ secrets.PREMIUM_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run check:debug-plan-prod

      - name: Start app
        run: |
          npm run start -- -p 3100 > /tmp/next-start.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:3100/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/next-start.log
          exit 1

      - run: npm run test:stable

      - name: Stop app
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill -9 "$APP_PID" || true
          fi
