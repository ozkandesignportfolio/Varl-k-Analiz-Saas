name: CI

on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:

  gitleaks_scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint_build:
    name: Lint + Build
    runs-on: ubuntu-latest
    needs: gitleaks_scan
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Build
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ]; then
            echo "Supabase public env missing in CI -> skipping build."
            exit 0
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Supabase service role missing in CI -> skipping build."
            exit 0
          fi
          npm run build

  stable_tests:
    name: Stable Tests
    runs-on: ubuntu-latest
    needs: lint_build
    if: ${{ secrets.TRIAL_EMAIL != '' && secrets.PREMIUM_EMAIL != '' }}

    env:
      TEST_BASE_URL: http://127.0.0.1:3100
      API_KEY: ${{ secrets.API_KEY }}
      TRIAL_EMAIL: ${{ secrets.TRIAL_EMAIL }}
      TRIAL_PASSWORD: ${{ secrets.TRIAL_PASSWORD }}
      PREMIUM_EMAIL: ${{ secrets.PREMIUM_EMAIL }}
      PREMIUM_PASSWORD: ${{ secrets.PREMIUM_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run start -- -p 3100 --hostname 127.0.0.1 > /tmp/next-start.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          sleep 10

      - name: Run stable suite
        run: npm run test:stable

      - name: Stop app
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill -9 "$APP_PID" || true
          fi

  rls_negative_test:
    name: RLS Negative Test
    runs-on: ubuntu-latest
    needs: lint_build
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Skip if Supabase secrets missing
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || \
             [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ] || \
             [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Skipping RLS tests: Supabase secrets missing"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run RLS negative spec
        run: npm run test:rls:negative

  rate_limit_abuse_test:
    name: Rate Limit Abuse Test
    runs-on: ubuntu-latest
    needs: lint_build
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Skip if Supabase secrets missing
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || \
             [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}" ] || \
             [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Skipping rate limit tests: Supabase secrets missing"
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rate-limit abuse spec
        run: npm run test:abuse:rate-limit