name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-e2e-gate:
    runs-on: ubuntu-latest
    env:
      TEST_BASE_URL: http://localhost:3100
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_RLS_USER_A_EMAIL: ${{ secrets.E2E_RLS_USER_A_EMAIL }}
      E2E_RLS_USER_A_PASSWORD: ${{ secrets.E2E_RLS_USER_A_PASSWORD }}
      E2E_RLS_USER_B_EMAIL: ${{ secrets.E2E_RLS_USER_B_EMAIL }}
      E2E_RLS_USER_B_PASSWORD: ${{ secrets.E2E_RLS_USER_B_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: E2E gate (prod build + db seed + playwright + rls)
        run: npm run test:e2e
